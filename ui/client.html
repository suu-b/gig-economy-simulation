<!DOCTYPE html>
<html>
<head>
  <title>Client</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>Client View</h2>
    <p id="clientId"></p>

    <input type="text" id="task" placeholder="Enter task description">
    <div class="actions">
      <button onclick="send()">Send</button>
      <button class="secondary" onclick="window.close()">Close Client</button>
    </div>

    <div class="logs" id="logs"></div>
  </div>

<script>
  const clientId = "CL-" + Math.floor(Math.random() * 10000);
  document.getElementById("clientId").innerText = "Client ID: " + clientId;

  let currentEventSource = null;

  function addLog(msg) {
    const logBox = document.getElementById("logs");
    const div = document.createElement("div");
    div.innerText = new Date().toLocaleTimeString() + " - " + msg;
    logBox.appendChild(div);
  }

  async function send() {
    const task = document.getElementById("task").value;

    try {
      const res = await fetch("http://localhost:8000/request", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          id: "REQ-" + Math.random().toString(36).substring(2, 10),
          client_id: clientId,
          content: task
        })
      });

      const data = await res.json();
      const requestId = data.request_id;

      addLog(`Request submitted: ${requestId}`);

      startStream(requestId);

    } catch (err) {
      console.log(err)
      addLog("Failed to send request");
    }
  }

  function startStream(requestId) {
    if (currentEventSource) {
      currentEventSource.close();
    }

    const url = `http://localhost:8000/stream/${requestId}`;
    const evtSource = new EventSource(url);
    currentEventSource = evtSource;

    evtSource.onmessage = function (event) {
      addLog(`Update: ${event.data}`);
    };

    evtSource.onerror = function () {
      addLog("Stream closed");
      evtSource.close();
    };
  }
</script>

</body>
</html>
